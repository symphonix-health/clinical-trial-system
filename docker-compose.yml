version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ctms
      POSTGRES_PASSWORD: ctms
      POSTGRES_DB: ctms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctms -d ctms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://ctms:ctms@db:5432/ctms
      REDIS_URL: redis://redis:6379/0
      WEBHOOK_SECRET: dev-webhook-secret
      LOG_LEVEL: info
      CTMS_BACKEND_PORT: ${CTMS_BACKEND_PORT:-9200}
    ports:
      - "${CTMS_BACKEND_PORT:-9200}:${CTMS_BACKEND_PORT:-9200}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - "uvicorn"
      - "app.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "${CTMS_BACKEND_PORT:-9200}"
      - "--reload"

  frontend:
    build: ./frontend
    environment:
      CTMS_BACKEND_PORT: ${CTMS_BACKEND_PORT:-9200}
    ports:
      - "${CTMS_FRONTEND_PORT:-5281}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
